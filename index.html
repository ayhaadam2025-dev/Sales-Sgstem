<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام المبيعات</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { display: flex; height: 100vh; background-color: #f4f6f9; }
        
        /* القائمة الجانبية */
        .sidebar {
            width: 240px;
            background-color: #1e293b;
            color: #fff;
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sidebar h2 { text-align: center; margin-bottom: 20px; color: #38bdf8; }

        .sidebar a {
            color: #fff;
            text-decoration: none;
            padding: 12px 15px;
            border-radius: 8px;
            transition: 0.3s;
        }

        .sidebar a:hover { background-color: #334155; color: #38bdf8; }

        /* منطقة عرض الشاشات */
        iframe {
            flex: 1;
            border: none;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <!-- القائمة الجانبية -->
    <div class="sidebar">
        <h2>نظام المبيعات</h2>
        <!-- التوجيه لـ iframe بواسطة target="main-frame" -->
        <a href="dashboard.html" target="main-frame">📊 لوحة التحكم</a>
        <a href="sales.html" target="main-frame">🛒 شاشة المبيعات</a>
    </div>

    <!-- الشاشة التي ينعرض داخلها المحتوى -->
    <iframe name="main-frame" src="dashboard.html"></iframe>

</body>
</html>
