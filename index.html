<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام المبيعات المتكامل</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            height: 100vh;
            background-color: #f4f6f9;
            color: #333;
        }

        /* 1. القائمة الجانبية (الشاشة الرئيسية/التنقل) */
        .sidebar {
            width: 250px;
            background-color: #1e293b;
            color: #fff;
            display: flex;
            flex-direction: column;
            padding: 20px 10px;
        }

        .sidebar h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #38bdf8;
        }

        .menu-item {
            padding: 12px 20px;
            margin: 5px 0;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .menu-item:hover, .menu-item.active {
            background-color: #334155;
            color: #38bdf8;
        }

        /* منطقة المحتوى الرئيسي */
        .main-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        /* 2. تصميم لوحة التحكم (Dashboard) */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .card h3 {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 10px;
        }

        .card .value {
            font-size: 24px;
            font-weight: bold;
            color: #0f172a;
        }

        /* 3. تصميم شاشة المبيعات (POS) */
        .pos-container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            height: 85vh;
        }

        .products-section {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .product-card {
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .product-card:hover {
            border-color: #38bdf8;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .cart-section {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .cart-items {
            list-style: none;
            margin-top: 15px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #f1f5f9;
        }

        .checkout-btn {
            background-color: #10b981;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
        }

        .checkout-btn:hover {
            background-color: #059669;
        }
    </style>
</head>
<body>

    <!-- القائمة الجانبية (الشاشة الرئيسية) -->
    <div class="sidebar">
        <h2>نظام المبيعات</h2>
        <div class="menu-item active" onclick="showScreen('dashboard', this)">
            📊 لوحة التحكم
        </div>
        <div class="menu-item" onclick="showScreen('pos', this)">
            🛒 شاشة المبيعات
        </div>
    </div>

    <!-- المحتوى المتغير -->
    <div class="main-content">

        <!-- 1. شاشة لوحة التحكم -->
        <div id="dashboard" class="screen active">
            <h1>لوحة التحكم والإحصائيات</h1>
            <br>
            <div class="stats-grid">
                <div class="card">
                    <h3>مبيعات اليوم</h3>
                    <div class="value">$1,250</div>
                </div>
                <div class="card">
                    <h3>عدد الفواتير</h3>
                    <div class="value">34</div>
                </div>
                <div class="card">
                    <h3>المنتجات المباعة</h3>
                    <div class="value">89</div>
                </div>
            </div>
        </div>

        <!-- 2. شاشة المبيعات -->
        <div id="pos" class="screen">
            <h1>شاشة المبيعات (POS)</h1>
            <br>
            <div class="pos-container">
                <!-- قسم المنتجات -->
                <div class="products-section">
                    <input type="text" placeholder="بحث عن منتج..." style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ccc;">
                    <div class="products-grid">
                        <div class="product-card">
                            <h4>منتج 1</h4>
                            <p>$10</p>
                        </div>
                        <div class="product-card">
                            <h4>منتج 2</h4>
                            <p>$25</p>
                        </div>
                        <div class="product-card">
                            <h4>منتج 3</h4>
                            <p>$15</p>
                        </div>
                    </div>
                </div>

                <!-- قسم السلة والإنهاء -->
                <div class="cart-section">
                    <div>
                        <h3>سلة المشتريات</h3>
                        <ul class="cart-items">
                            <li class="cart-item">
                                <span>منتج 1 (x2)</span>
                                <span>$20</span>
                            </li>
                            <li class="cart-item">
                                <span>منتج 2 (x1)</span>
                                <span>$25</span>
                            </li>
                        </ul>
                    </div>
                    <div>
                        <h2>الإجمالي: $45</h2>
                        <button class="checkout-btn">إتمام عملية البيع</button>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- JavaScript للتنقل بين الشاشات -->
    <script>
        function showScreen(screenId, element) {
            // إخفاء كل الشاشات
            document.querySelectorAll('.screen').forEach(screen => {
                screen.classList.remove('active');
            });
            // إزالة التحديد من القائمة
            document.querySelectorAll('.menu-item').forEach(item => {
                item.classList.remove('active');
            });

            // إظهار الشاشة المطلوبة وتحديد الزر
            document.getElementById(screenId).classList.add('active');
            element.classList.add('active');
        }
    </script>
</body>
</html>
